- type: entity
  id: MedalCase
  name: medal case
  description: Case with medals.
  parent: [ BaseStorageItem, BaseBagOpenClose, BaseCommandContraband ]
  components:
  - type: Sprite
    sprite: Objects/Storage/medalcase.rsi
    layers:
    - state: closed
      map: ["closeLayer"]
    - state: open
      map: ["openLayer"]
  - type: Appearance
  - type: Item
    sprite: Objects/Storage/medalcase.rsi
    size: Normal
  - type: Storage
    grid:
    - 0,0,7,1
    whitelist:
      tags:
        - Medal
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingNeckGoldmedal
        - id: ClothingNeckBronzeheart
        - id: ClothingNeckCargomedal
        - id: ClothingNeckEngineermedal
        - id: ClothingNeckMedicalmedal
        - id: ClothingNeckSciencemedal
        - id: ClothingNeckSecuritymedal
        - id: ClothingNeckClownmedal
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/matchbox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/matchbox_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/matchbox_drop.ogg
  #DS14-End
