- type: entity
  parent: BaseItem
  id: ProximitySensor
  name: proximity sensor
  description: Senses things in close proximity.
  components:
  - type: Sprite
    sprite: Objects/Misc/proximity_sensor.rsi
    state: icon
  - type: Tag
    tags:
      - ProximitySensor
  - type: StaticPrice
    price: 40
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/component_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/component_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/component_drop.ogg
  #DS14-End

