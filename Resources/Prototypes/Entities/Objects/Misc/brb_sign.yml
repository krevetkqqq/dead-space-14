- type: entity
  parent: BaseItem
  id: BrbSign
  name: brb sign
  description: Lets others know you are away.
  components:
  - type: Sprite
    sprite: Objects/Misc/brbsign.rsi
    state: icon
  - type: Clothing
    sprite: Objects/Misc/brbsign.rsi
    quickEquip: false
    slots:
    - Neck
  - type: Item
    storedRotation: -90
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  #DS14-End
