### For items thare are used as intermediate steps on a crafting recipe but have no use outside of it.
- type: entity
  parent: BaseItem
  id: MoproachShoes
  name: moproach shoes
  description: Three pairs of tiny mopshoes, perfectly fit for a moproach.
  components:
  - type: Sprite
    sprite: Objects/Misc/moproach_shoes.rsi
    state: mopshoes
  - type: Construction
    graph: MoproachShoes
    node: shoes
  - type: Item
    size: Tiny
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/shoes/sneakers_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/shoes/sneakers_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/shoes/sneakers_drop.ogg
  #DS14-End
