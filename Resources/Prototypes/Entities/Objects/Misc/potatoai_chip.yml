- type: entity
  id: PotatoAIChip
  name: supercompact AI chip
  parent: BaseItem
  description: This high-tech AI chip requires a voltage of exactly 1.1V to function correctly.
  components:
    - type: Sprite
      sprite: Objects/Misc/potatoai_chip.rsi
      state: icon
    - type: Item
      size: Tiny
    - type: Tag
      tags:
        - SmallAIChip
    - type: Construction
      graph: PotatoAIChip
      node: potatoaichip
    #DS14-Start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_DeadSpace/Items/Handing/component_pickup.ogg
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/_DeadSpace/Items/Handing/component_drop.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_DeadSpace/Items/Handing/component_drop.ogg
    #DS14-End
