- type: entity
  name: broken bottle
  parent: BaseItem
  id: BrokenBottle
  description: In Space Glasgow this is called a conversation starter.
  components:
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Slash: 5
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Sprite
    sprite: Objects/Misc/broken_bottle.rsi
    state: icon
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 2
  - type: Tag
    tags:
    - Trash
  - type: PhysicalComposition
    materialComposition:
      Glass: 50
  - type: SpaceGarbage
  - type: ToolRefinable
    refineResult:
    - id: SheetGlass1
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/glass_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/glass_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/glass_drop.ogg
  #DS14-End
