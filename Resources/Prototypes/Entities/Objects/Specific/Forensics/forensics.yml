- type: entity
  id: ForensicPad
  name: forensic pad
  parent: BaseItem
  description: A forensic pad for collecting fingerprints or fibers.
  components:
  - type: Item
    size: Tiny
  - type: ForensicPad
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper
      color: yellow
  - type: Tag
    tags:
    - Document
  - type: GuideHelp
    guides:
    - Forensics
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/paper_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/paper_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/paper_drop.ogg
  #DS14-End
