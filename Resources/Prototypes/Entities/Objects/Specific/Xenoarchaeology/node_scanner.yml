- type: entity
  parent: BaseItem
  id: NodeScanner
  name: node scanner
  description: The archeologist's friend, able to identify the node of an artifact with only a single scan.
  components:
    - type: Sprite
      sprite: Objects/Specific/Xenoarchaeology/node_scanner.rsi
      state: icon
    - type: Item
      sprite: Objects/Specific/Xenoarchaeology/node_scanner.rsi
    - type: NodeScanner
    - type: UseDelay
      delay: 1
    - type: GuideHelp
      guides:
      - Xenoarchaeology
    - type: ActivatableUI
      key: enum.NodeScannerUiKey.Key
      singleUser: true
    - type: UserInterface #needs to be here for certain effects
      interfaces:
        enum.NodeScannerUiKey.Key:
          type: NodeScannerBoundUserInterface
    #DS14-Start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
    - type: EmitSoundOnDrop 
      sound:
        path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
    #DS14-End
