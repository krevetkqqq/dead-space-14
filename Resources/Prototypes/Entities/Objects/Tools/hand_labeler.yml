- type: entity
  parent: BaseItem
  id: HandLabeler
  name: hand labeler
  description: A hand labeler, used to label items and objects.
  components:
    - type: Sprite
      sprite: Objects/Tools/hand_labeler.rsi
      state: hand_labeler
    - type: Item
      sprite: Objects/Tools/hand_labeler.rsi
      storedRotation: -90
    - type: UseDelay
      delay: 2.0
    - type: ActivatableUI
      key: enum.HandLabelerUiKey.Key
      inHandsOnly: true
    - type: UserInterface
      interfaces:
        enum.HandLabelerUiKey.Key:
          type: HandLabelerBoundUserInterface
    - type: HandLabeler
      whitelist:
        components:
          - Item
        tags:
          - Structure
    - type: PhysicalComposition
    #DS14-Start
    - type: EmitSoundOnPickup
      sound:
        path: /Audio/_DeadSpace/Items/Handing/tools/rcd_pickup.ogg
    - type: EmitSoundOnDrop
      sound:
        path: /Audio/_DeadSpace/Items/Handing/tools/rcd_drop.ogg
    - type: EmitSoundOnLand
      sound:
        path: /Audio/_DeadSpace/Items/Handing/tools/rcd_drop.ogg
    #DS14-End
