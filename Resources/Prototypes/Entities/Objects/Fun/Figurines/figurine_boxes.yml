- type: entity
  id: MysteryFigureBoxTrash
  parent: BaseItem
  name: unfolded cardboard box
  description: A small, unfolded cardboard toy box.
  components:
  - type: PhysicalComposition
    materialComposition:
      Cardboard: 50
  - type: Sprite
    sprite: Objects/Fun/figurines.rsi
    state: fig_box_unfolded
  - type: Tag
    tags:
    - Trash
  - type: SpaceGarbage
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/cardboard_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/cardboard_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/cardboard_drop.ogg
  #DS14-End

- type: entity
  parent: BaseItem
  id: MysteryFigureBox
  name: mystery spacemen minifigure box
  description: A box containing a mystery minifigure. The side of the box depicts a few blacked-out 'rare' figures, including one with a large, non-humanoid shilouette.
  components:
  - type: Sprite
    sprite: Objects/Fun/figurines.rsi
    layers:
      - state: fig_box
  - type: TriggerOnActivate
  - type: DeleteOnTrigger
  - type: EmitSoundOnTrigger
    positional: true
    predicted: true
    sound:
      path: /Audio/Effects/unwrap.ogg
  - type: SpawnEntityTableOnTrigger
    useMapCoords: true
    table: !type:AllSelector
      children:
      - id: MysteryFigureBoxTrash
      - !type:GroupSelector
        children:
        - id: ToyFigurinePassenger
