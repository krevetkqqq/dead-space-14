# When adding a new board game, also add it to id: AllBoardGamesTable

# The actual item that players can pick up, or throw when they lose
- type: entity
  abstract: true
  parent: BaseItem
  id: BaseBoardEntity # Board item
  name: board
  description: A blank board.
  components:
  - type: TabletopGame
    size: 256, 256
    setup:
      !type:TabletopEmptySetup
      boardPrototype: Crowbar
  - type: Tag
    tags:
    - TabletopBoard
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/book_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/book_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/book_drop.ogg
  #DS14-End

- type: entity
  abstract: true
  parent: BaseItem
  id: BaseTabletopPiece # Board piece
  components:
  - type: TabletopDraggable
  - type: Sprite
    noRot: true
  - type: Appearance
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  #DS14-End

# Entity which acts as the background sprite in the tabletop game
- type: entity
  abstract: true
  id: BaseBoardTabletop
  name: baseboard
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    drawdepth: FloorTiles
