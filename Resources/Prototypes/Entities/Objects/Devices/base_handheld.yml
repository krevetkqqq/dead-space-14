- type: entity
  abstract: true
  parent: [BaseItem, PowerCellSlotSmallItem]
  id: BaseHandheldComputer
  components:
  - type: ActivatableUIRequiresPowerCell
  - type: ItemToggle
    onUse: false # above component does the toggling
  - type: PowerCellDraw
    drawRate: 0
    useCharge: 20
  - type: ToggleCellDraw
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  #DS14-End
