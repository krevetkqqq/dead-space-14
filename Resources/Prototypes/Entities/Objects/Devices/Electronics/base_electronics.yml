- type: entity
  id: BaseElectronics
  parent: BaseItem
  name: base electronics
  abstract: true
  suffix: Electronics
  components:
  - type: Item
    storedRotation: -90
  - type: Sprite
    sprite: Objects/Misc/module.rsi
    state: generic
  - type: PhysicalComposition
    materialComposition:
      Glass: 200
    chemicalComposition:
      Silicon: 20
  - type: Circuitboard
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/disk_drop.ogg
  #DS14-End
