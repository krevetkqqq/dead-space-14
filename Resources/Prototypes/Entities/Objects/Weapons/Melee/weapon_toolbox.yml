- type: entity
  parent: BaseItem
  id: WeaponMeleeToolboxRobust
  name: robust toolbox
  description: A tider's weapon.
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: Objects/Tools/Toolboxes/toolbox_red.rsi
    state: icon
  - type: Item
    size: Ginormous
    sprite: Objects/Tools/Toolboxes/toolbox_red.rsi
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Blunt: 20
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/tools/toolbox_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/Items/toolbox_drop.ogg
  #DS14-End
