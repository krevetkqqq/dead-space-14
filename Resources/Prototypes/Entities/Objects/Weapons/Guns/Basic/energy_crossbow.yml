- type: entity
  abstract: true
  parent: BaseItem
  id: WeaponEnergyCrossbowBase
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
  - type: Item
    sprite: Objects/Weapons/Guns/Basic/energy_crossbow.rsi
    size: Small
  - type: Gun
    fireRate: 5 #high firerate innately bottlenecked by ammo regeneration speed.
    selectedMode: SemiAuto
    minAngle: 0
    maxAngle: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/energycrossbow_shoot.ogg
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 5 #2 seconds of KD, should always have CD > KD
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/energycrossbow_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: EnergyCrossbowBoltTrace
    capacity: 1
    count: 1
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/gun_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/gun_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/gun_drop.ogg
  #DS14-End


