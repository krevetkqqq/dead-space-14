- type: entity
  parent: BaseItem
  id: AmeJar
  name: AME fuel jar
  description: A hermetically sealed jar containing antimatter for use in an antimatter reactor.
  components:
  - type: Item
    size: Normal
    sprite: Objects/Power/AME/ame_jar.rsi
  - type: Sprite
    sprite: Objects/Power/AME/ame_jar.rsi
    state: jar
  - type: AmeFuelContainer
  - type: StaticPrice
    price: 500
  - type: GuideHelp
    guides: [ AME, Power ]
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/tray/tray_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/tray/tray_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/tray/tray_drop.ogg
  #DS14-End
