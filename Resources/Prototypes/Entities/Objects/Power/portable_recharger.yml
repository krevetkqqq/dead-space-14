- type: entity
  parent: Clothing
  id: PortableRecharger
  name: portable recharger
  description: High-tech recharger adapted for portability.
  components:
  - type: Item
    size: Ginormous # DS14
  - type: Sprite
    sprite: Objects/Power/portable_recharger.rsi
    layers:
    - map: ["enum.PowerChargerVisualLayers.Base"]
      state: charging
    - map: ["enum.PowerChargerVisualLayers.Light"]
      state: charging-unlit
      shader: unshaded
  - type: Clothing
    equippedPrefix: charging
    quickEquip: false
    slots:
    - back
    - suitStorage # DS14
  - type: Charger
    slotId: charger_slot
    portable: true
  - type: PowerChargerVisuals
  - type: StaticPrice
    price: 500
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: ContainerContainer
    containers:
      charger_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      charger_slot:
        ejectOnInteract: false # DS14 for alt+click
        whitelist:
          components:
          - BatteryAmmoProvider
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/armor_rustle/plate_armor_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/armor_rustle/plate_armor_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/armor_rustle/plate_armor_drop.ogg
  #DS14-End
