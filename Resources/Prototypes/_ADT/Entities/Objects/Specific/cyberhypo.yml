- type: entity
  parent: BaseItem
  id: ADTCyberHypospray
  name: киберсан гипоспрей
  description: Относительно массовая модель, созданная с помощью реверс-инженеринга на основе боевого гипоспрея NT для оперативников Мародёров Горлекса. Имеет повышенную вместимость в ущерб скорости применения.
  components:
  - type: Sprite
    sprite: _ADT/Objects/Specific/cyberhypo.rsi
    state: hypo
  - type: Item
    sprite: _ADT/Objects/Specific/cyberhypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 30
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 1.0
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  #DS14-End
