- type: entity
  parent: BaseItem
  id: ADTCombatHypo
  name: боевой гипоспрей
  description: Модель гипоспрея, разработанная NT для использования в боевых ситуациях - с повышенным объемом в ущерб скорости применения.
  components:
  - type: Sprite
    sprite: _ADT/Objects/Specific/Medical/adt_combathypo.rsi
    state: icon
  - type: Item
    sprite: _ADT/Objects/Specific/Medical/adt_combathypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 45
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 1.0
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  #DS14-End
