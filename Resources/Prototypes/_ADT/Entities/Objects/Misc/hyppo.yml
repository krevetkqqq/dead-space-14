- type: entity
  parent: BaseItem
  id: JanaHypo
  name: экспериментальный гипоспрей
  description: Был сконструирован и улучшен благодаря Джолин. Пахнет как бикаридин.
  components:
  - type: Sprite
    sprite: _ADT/Objects/Misc/Hyppo.rsi
    state: hypo
  - type: Item
    sprite: _ADT/Objects/Misc/Hyppo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 50
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0
  - type: StaticPrice
    price: 750
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    radius: 2
    softness: 5
    autoRot: true
    color: "#be090e"
    energy: 3
  #DS14-Start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gas_analyzer/gas_analyzer_drop.ogg
  #DS14-End
