    - id: ClothingShoesBootsMagnon_stop_smetana
    - id: ClothingEyesHudMedicalnon_stop_smetana
    - id: PaperLawnon_stop_smetana
    - id: ClothingHeadHatHeadnon_stop_smetana
    - id: ClothingHandsGlovesnon_stop_smetana
    - id: ClothingNeckMantlenon_stop_smetana
    - id: trayScannernon_stop_smetana
    - id: ClothingHeadsetnon_stop_smetana
    - id: ClothingUniformJumpsuitnon_stop_smetana
    - id: PDAnon_stop_smetana
    - id: MedkitAdvancedFilled
    - id: ClothingHeadHatBeretnon_stop_smetana
    - id: ClothingMasknon_stop_smetana
    - id: ClothingNeckCloakMaskhalatWhite1non_stop_smetana
    - id: ClothingNeckCloakMaskhalatBlack1non_stop_smetana
