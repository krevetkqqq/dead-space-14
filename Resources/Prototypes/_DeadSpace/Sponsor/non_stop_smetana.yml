# hypo.rsi
- type: entity
  parent: BaseItem
  id: Hypospraynon_stop_smetana
  name: инъектор многократного применения
  description: Инъектор, что сравним по скорости с гипоспреем и готов моментально ввести нужны реагенты. Целестин, пунктураз, дермалин или иные реагенты что может хранить данный инъектор. Используется элитными бойцами, что не боятся умереть в бою.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/non_stop_smetana/hypo.rsi
    state: hypo
  - type: Item
    sprite: _DeadSpace/Sponsor/non_stop_smetana/hypo.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 5
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: UseDelay
    delay: 0.5
  - type: Appearance

# tools_jawsoflife.rsi
- type: entity
  parent: JawsOfLife
  id: JawsOfLifenon_stop_smetana
  name: тактические челюсти жизни
  description: Трофейные челюсти жизни, что ранее были вырваны с МЭК. Когда-то они могли порвать стены как лист бумаги, но сейчас едва вскрывают шлюзы.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/non_stop_smetana/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    inhandVisuals:
      left:
      - state: syn_inhand-left
      right:
      - state: syn_inhand-right
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Sponsor/non_stop_smetana/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Sponsor/non_stop_smetana/tools_jawsoflife.rsi
