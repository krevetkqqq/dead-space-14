# Backpack
- type: entity
  parent: ClothingBackpack
  id: ClothingBackpackNSS
  name: единица тактической поддержки C-90
  description: Несмотря на новейшую модель, этот дрон так и не смог достигнуть эффективности своей более ранней версии и потерял все боевые функции. Его динамик вырван, а на боковой стороне изображена фигура, напоминающая тигра.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/non_stop_smetana/backpack.rsi
    scale: 0.75, 0.75
  - type: Clothing
    sprite: _DeadSpace/Sponsor/non_stop_smetana/backpack.rsi
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
        scale: 0.45, 0.45
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,13,10
  - type: StorageFill
