    size: Huge
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.6
        Heat: 0.5
        Radiation: 0.5
        Caustic: 0.5
        Stun: 0.65
  - type: ExplosionResistance
