# Гарнитура

- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltAngor
  name: Гарнитура ЧВК "Ангор"
  description: Камуфляжная гарнитура, с виду выглядит достаточно статно. Присутствует гравировка - *Частная Военная Корпорация "Ангор"*
  components:
    - type: Headset
      color: "#616143FF"
    - type: EncryptionKeyHolder
      keySlots: 5
    - type: ContainerFill
      containers:
        key_slots:
          - PMC_EncryptionKeyAngor
    - type: Sprite
      sprite: _DeadSpace/TEMP_FOR_EVENT/uuuhhhh_magic/ANGOR/garnitur.rsi
    - type: Clothing
      sprite: _DeadSpace/TEMP_FOR_EVENT/uuuhhhh_magic/ANGOR/garnitur.rsi


- type: radioChannel
  id: RadioAngor
  name: chat-radio-angor
  keycode: 'ё'
  frequency: 2966
  color: "#616143FF"
  longRange: true

- type: entity
  parent: EncryptionKey
  id: PMC_EncryptionKeyAngor
  name: Ключ шифрования ЧВК "Ангор"
  description: Уверены что хотите знать дела Частной Военной Корпорации?.
  components:
  - type: EncryptionKey
    channels:
    - RadioAngor
    defaultChannel: RadioAngor
  - type: Sprite
    sprite: "_DeadSpace/TEMP_FOR_EVENT/uuuhhhh_magic/ANGOR/Angor_key.rsi"
    layers:
    - state: key_Angor

