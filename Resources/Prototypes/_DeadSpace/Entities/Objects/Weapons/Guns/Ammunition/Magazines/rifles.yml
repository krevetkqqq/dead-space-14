- type: entity
  parent: MagazineLightRifle
  id: MagazineLightRifleExtended
  name: магазин (Расширенный, 7.62х39мм)
  description: ""
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
    capacity: 45
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Ammunition/Magazine/LightRifleEx.rsi
    scale: 1.1, 1.1
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

- type: entity
  parent: BaseItem
  id: MagazineLightRifleAMD
  name: магазин на АМД-76 (7.62х39мм винтовочные)
  components:
  - type: Tag
    tags:
      - MagazineAMD
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifle
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeLightRifle
    capacity: 20
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _DeadSpace/Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/amd.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/gun/ballistics/magazine/magazine_drop.ogg

- type: entity
  parent: MagazineLightRifleAMD
  id: MagazineLightRifleAMDEmpty
  name: магазин на АМД-76 (7.62х39мм винтовочные любые)
