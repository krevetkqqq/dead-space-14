- type: entity
  parent: BaseItem
  id: Hairball
  name: комок волос
  description: Чувак, фелиниды... они отвратительны.
  components:
  - type: Sprite
    sprite: _DeadSpace/Objects/Specific/Species/felinid.rsi
    state: icon
  - type: Hairball
  - type: SolutionContainerManager
    solutions:
      hairball:
        maxVol: 25
        reagents:
        - ReagentId: Protein
          Quantity: 2
  - type: Extractable
    grindableSolutionName: hairball
  - type: Tag
    tags:
    - Recyclable
    - Trash
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/glove_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/glove_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/glove_drop.ogg
