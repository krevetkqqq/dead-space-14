- type: entity
  parent: SheetMetalBase
  id: SheetTitanium
  name: титан
  suffix: Полный
  components:
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Titanium: 100
  - type: Stack
    stackType: Titanium
    baseLayer: base
    layerStates:
    - titanium
    - titanium_2
    - titanium_3
  - type: Sprite
    state: titanium_3
    layers:
    - state: titanium_3
      map: ["base"]
  - type: Item
    heldPrefix: titanium
  - type: Appearance
  - type: Extractable
    grindableSolutionName: titanium
  - type: SolutionContainerManager
    solutions:
      titanium:
        reagents:
        - ReagentId: Titanium
          Quantity: 10
  - type: Tag
    tags:
    - Sheet
    - Titanium
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/metal_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/metal_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_DeadSpace/Items/Handing/materials/metal_drop.ogg

