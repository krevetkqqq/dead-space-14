- type: entity
  parent: ClothingBackpackSyndicate
  id: ClothingBackpackSyndicateBundle
  abstract: true
  components:
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: ClothingBackpackSyndicateBundle
  id: ClothingBackpackSyndicateRaidBundle
  name: syndicate raid suit bundle
  description: "Contains the Syndicate's durable raid armor suit."
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingOuterArmorRaid
        - id: ClothingHeadHelmetRaid
        - id: ClothingMaskGasSyndicate
        - id: ClothingHandsGlovesCombat

- type: entity
  parent: ClothingBackpackSyndicateBundle
  id: ClothingBackpackDuffelSyndicateFilledStarterKit
  description: Cодержит самое необходимое для оперативника.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: DrinkShakerSyndie
          amount: 2
        - id: EnergySword
        - id: ADTCyberHypospray
        - id: EmpImplanter
        - id: ScramImplanter
        - id: ClothingShoesChameleonNoSlips
        - id: EnergyShield
        - id: ClothingEyesHudSyndicateAgent
        - id: CombatMedipen
          amount: 3